<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de Monitoreo VANCAN 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #0b5ed7;
      --primary-600: #0a58ca;
      --muted: #6b7280;
      --radius: 10px;
      --shadow: 0 6px 18px rgba(11, 94, 215, 0.08);
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      background: var(--bg);
      margin: 0;
      padding: 20px;
      color: #0f172a;
      min-height: 100vh;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }
    
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 8px;
    }
    
    .header p {
      color: var(--muted);
      font-size: 16px;
      margin: 0;
    }
    
    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 700px;
    }
    
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(11, 94, 215, 0.15);
    }
    
    .card-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .card h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
      margin: 0 0 12px;
    }
    
    .card p {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 20px;
      flex-grow: 1;
    }
    
    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    .btn:hover {
      background: var(--primary-600);
    }
    
    .footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    
    @media (max-width: 600px) {
      .container {
        min-height: auto;
        padding: 20px;
      }
      
      .header {
        margin-bottom: 30px;
      }
      
      .header h1 {
        font-size: 24px;
      }
      
      .options {
        grid-template-columns: 1fr;
      }
      
      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#0b5ed7"/>
        <path d="M7 12h10M7 8h10M7 16h6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Panel de Monitoreo VANCAN</h1>
      <p>2026 - Selecciona el formulario a completar</p>
    </div>
    
    <div class="options">
      <a href="monitoreo.html" class="card">
        <div class="card-icon">📋</div>
        <h2>Monitoreo</h2>
        <p>Registro de encuestas y participación en actividades VANCAN</p>
        <button class="btn" type="button">Acceder</button>
      </a>
      
      <a href="monitoreo2.html" class="card">
        <div class="card-icon">📊</div>
        <h2>Monitoreo-2</h2>
        <p>Registro de participación adicional y datos complementarios</p>
        <button class="btn" type="button">Acceder</button>
      </a>
    </div>
    
    <div class="footer">
      <p>© 2026 Sistema de Monitoreo VANCAN</p>
    </div>
  </div>
</body>
</html>
